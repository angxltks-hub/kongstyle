<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONG STYLE</title>

<link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" as="style" onload="this.rel='stylesheet'">

<style>
:root {
  --negro: #0a0a0a;
  --verde: #00ff88;
  --gris: #1a1a1a;
  --blanco: #f5f5f5;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--negro);
  font-family: 'Montserrat', sans-serif;
  color: var(--blanco);
}

/* ================= LOADER ================= */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #0a0a0a 40%, #000 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
}

.loader-logo {
  width: 180px;
  z-index: 2;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(0,255,136,0.6));
}

.smoke {
  position: absolute;
  width: 300%;
  height: 300%;
  background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, transparent 60%);
  animation: smokeMove 8s linear infinite;
  filter: blur(80px);
  opacity: 0.4;
}

@keyframes smokeMove {
  0% { transform: translate(-20%, -20%) scale(1); }
  50% { transform: translate(10%, 10%) scale(1.2); }
  100% { transform: translate(-20%, -20%) scale(1); }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img {
  width:200px;
  margin-bottom:20px;
}

.hero h1 {
  font-size:3rem;
  color: var(--verde);
}

button {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  background: var(--verde);
  color:black;
  cursor:pointer;
}

/* ================= PROMOS ================= */
.promos {
  padding:80px 20px;
}

.cards {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
}

.promo-card {
  position:relative;
  border-radius:15px;
  overflow:hidden;
}

.promo-card img {
  width:100%;
  height:260px;
  object-fit:cover;
}

.promo-info {
  position:absolute;
  bottom:0;
  padding:10px;
  background:linear-gradient(to top, black, transparent);
}

/* ================= COLLECTIONS ================= */
.collections {
  padding:80px 20px;
}

.collection-card {
  background: var(--gris);
  padding:40px;
  text-align:center;
  cursor:pointer;
}

/* ================= MODAL ================= */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

.modal.show {
  display:flex;
}

.modal-content {
  background:#111;
  padding:30px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="smoke"></div>
  <img src="kongg.png" class="loader-logo">
</div>

<!-- HERO -->
<section class="hero">
  <img src="kongg.png">
  <h1>KONG STYLE</h1>
  <button onclick="scrollToCollections()">Entrar</button>
</section>

<!-- PROMOS -->
<section class="promos">
  <h2>🔥 Promociones</h2>
  <div class="cards">

    <div class="promo-card">
      <img src="img/promo2.webp">
      <div class="promo-info">
        <h3>-10% Originales</h3>
      </div>
    </div>

    <div class="promo-card">
      <img src="img/promo1.webp">
      <div class="promo-info">
        <h3>2 x $1400</h3>
      </div>
    </div>

  </div>
</section>

<!-- COLLECTIONS -->
<section class="collections" id="collections">
  <div class="cards">

    <div class="collection-card" onclick="openModal('zacatelco')">
      ZACATELCO
    </div>

    <div class="collection-card" onclick="openModal('puebla')">
      PUEBLA
    </div>

    <div class="collection-card" onclick="openModal('cholula')">
      CHOLULA
    </div>

  </div>
</section>

<!-- MODALS -->
<div id="zacatelco" class="modal">
  <div class="modal-content">
    <button onclick="closeModal()">X</button>
    <h2>Zacatelco</h2>
  </div>
</div>

<div id="puebla" class="modal">
  <div class="modal-content">
    <button onclick="closeModal()">X</button>
    <h2>Puebla</h2>
  </div>
</div>

<div id="cholula" class="modal">
  <div class="modal-content">
    <button onclick="closeModal()">X</button>
    <h2>Cholula</h2>
  </div>
</div>

<script>
function openModal(id){
  document.getElementById(id).classList.add('show');
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
}

function scrollToCollections(){
  document.getElementById('collections').scrollIntoView({behavior:'smooth'});
}

/* LOADER */
window.addEventListener("load", () => {
  const loader = document.getElementById("loader");

  setTimeout(() => {
    loader.style.opacity = "0";
    loader.style.transition = "0.6s";

    setTimeout(() => {
      loader.style.display = "none";
    }, 600);

  }, 1200);
});
</script>

</body>
</html>
