<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="KONG STYLE: Calidad • Confiabilidad . Puebla, Zacatelco, Cholula. Modelos Exclusivos.">
<title>KONG STYLE | High Unisex</title>

<link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;600;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet"></noscript>

<style>
:root {
  --negro-deep: #0a0a0a;
  --negro: #151515;
  --gris-dark: #242424;
  --blanco: #f5f5f5;
  --verde-premium: #00ff88;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--negro-deep);
  font-family: 'Montserrat', sans-serif;
  color: var(--blanco);
}

/* NAV */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 50px;
  background: rgba(10,10,10,0.95);
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  background: linear-gradient(135deg, var(--verde-premium), var(--blanco));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-menu { display: flex; gap: 30px; list-style: none; }
.nav-link { color: white; text-decoration: none; }

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hero-main-title {
  font-size: 4rem;
}

/* COLLECTIONS */
.collections {
  padding: 150px 50px;
}

.collections-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 30px;
}

.collection-card {
  height: 400px;
  background: var(--gris-dark);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

.collection-image {
  width: 100%;
  background-size: cover;
  background-position: center;
}

.collection-overlay {
  padding: 20px;
}

.collection-title {
  font-size: 1.5rem;
}

.collection-links a {
  display: inline-block;
  margin-top: 10px;
  color: white;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal.show { display: flex; }

.modal-content {
  background: black;
  padding: 40px;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">KONG STYLE</div>
</nav>

<section class="hero">
  <h1 class="hero-main-title">KONG STYLE</h1>
</section>

<section class="collections" id="collections">
  <div class="collections-grid">

    <!-- PROMOCIONES -->
    <div class="collection-card" onclick="openModal('promociones')">

      <div class="collection-image" style="
        height:60%;
        background-image:url('promo1.webp');
      "></div>

      <div class="collection-image" style="
        height:40%;
        background-image:url('promo2.webp');
      "></div>

      <div class="collection-overlay">
        <h3 class="collection-title">PROMOCIONES</h3>
        <div class="collection-links">
          <a href="https://wa.me/522221171466">WhatsApp</a>
          <a href="https://www.instagram.com/kong_stylemx">Instagram</a>
        </div>
      </div>

    </div>

  </div>
</section>

<!-- MODAL PROMOCIONES -->
<div id="promociones" class="modal">
  <div class="modal-content">
    <h2>PROMOCIONES</h2>
    <a href="https://wa.me/522221171466">WhatsApp</a><br><br>
    <a href="https://www.instagram.com/kong_stylemx">Instagram</a>
  </div>
</div>

<script>
function openModal(id){
  document.getElementById(id).classList.add('show');
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'));
}
</script>

</body>
</html>
