<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONG STYLE</title>

<link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" as="style" onload="this.rel='stylesheet'">

<style>
:root {
  --negro: #0a0a0a;
  --verde: #00ff88;
  --gris: #1a1a1a;
  --blanco: #f5f5f5;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--negro);
  font-family: 'Montserrat', sans-serif;
  color: var(--blanco);
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #0a0a0a 40%, #000 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
}

.loader-logo {
  width: 180px;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(0,255,136,0.6));
}

.smoke {
  position: absolute;
  width: 300%;
  height: 300%;
  background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, transparent 60%);
  animation: smokeMove 8s linear infinite;
  filter: blur(80px);
}

@keyframes smokeMove {
  0% { transform: translate(-20%, -20%); }
  50% { transform: translate(10%, 10%); }
  100% { transform: translate(-20%, -20%); }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* HERO */
.hero {
  height: 100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img { width:200px; }

.hero h1 {
  font-size: 2.5rem;
  color: var(--verde);
}

.btn {
  margin:10px;
  padding:15px 25px;
  background: var(--verde);
  color:black;
  border:none;
  cursor:pointer;
  border-radius:20px;
}

/* PROMOS */
.promos {
  padding:80px 20px;
}

.cards {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
}

.promo-card {
  position:relative;
  border-radius:15px;
  overflow:hidden;
}

.promo-card img {
  width:100%;
  height:260px;
  object-fit:cover;
}

.promo-info {
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(to top, black, transparent);
}

.promo-info h3 {
  color: var(--verde);
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

.modal.show { display:flex; }

.modal-content {
  background:#111;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

.modal a {
  display:block;
  margin:10px 0;
  color:var(--verde);
  text-decoration:none;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="smoke"></div>
  <img src="kongg.png" class="loader-logo">
</div>

<!-- HERO -->
<section class="hero">
  <img src="kongg.png" alt="logo">
  <h1>KONG STYLE</h1>

  <button class="btn" onclick="openModal('zacatelco')">Zacatelco</button>
  <button class="btn" onclick="openModal('puebla')">Puebla</button>
  <button class="btn" onclick="openModal('cholula')">Cholula</button>
</section>

<!-- PROMOS -->
<section class="promos">
  <h2>🔥 Promociones</h2>

  <div class="cards">

    <div class="promo-card">
      <img src="img/promo2.webp" alt="Promo 1">
      <div class="promo-info">
        <h3>Abril Hot</h3>
        <p>10% de descuento</p>
      </div>
    </div>

    <div class="promo-card">
      <img src="img/promo1.webp" alt="Promo 2">
      <div class="promo-info">
        <h3>2 x $1400</h3>
        <p>Combo especial</p>
      </div>
    </div>

  </div>
</section>

<!-- MODALS -->

<div id="zacatelco" class="modal">
  <div class="modal-content">
    <h2>Zacatelco</h2>
    <a href="https://wa.me/522463335286" target="_blank">WhatsApp</a>
    <a href="https://maps.app.goo.gl/Krjpk4uEXftTmZTT9" target="_blank">Maps</a>
    <a href="https://www.instagram.com/kong_styletlax" target="_blank">Instagram</a>
    <a href="https://www.tiktok.com/@kstlax" target="_blank">TikTok</a>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<div id="puebla" class="modal">
  <div class="modal-content">
    <h2>Puebla</h2>
    <a href="https://wa.me/522221171466" target="_blank">WhatsApp</a>
    <a href="https://maps.app.goo.gl/1qL6vZrHGEgwBD6j7" target="_blank">Maps</a>
    <a href="https://www.instagram.com/kong_stylemx" target="_blank">Instagram</a>
    <a href="https://www.tiktok.com/@ks.pue" target="_blank">TikTok</a>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<div id="cholula" class="modal">
  <div class="modal-content">
    <h2>Cholula</h2>
    <a href="https://maps.app.goo.gl/5wtao2j7wzBmtDLv9" target="_blank">Maps</a>
    <a href="https://www.instagram.com/kong_stylemx" target="_blank">Instagram</a>
    <a href="https://www.tiktok.com/@cholukong" target="_blank">TikTok</a>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
function openModal(id){
  document.getElementById(id).classList.add('show');
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
}

window.addEventListener("load", () => {
  const loader = document.getElementById("loader");

  setTimeout(() => {
    loader.style.opacity = "0";
    loader.style.transition = "0.6s";

    setTimeout(() => {
      loader.style.display = "none";
    }, 600);
  }, 1200);
});
</script>

</body>
</html>
