<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONG STYLE || HIGH UNISEX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --verde: #00ff88;
  --verde2: #00cc66;
  --fondo: #020402;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background: radial-gradient(circle, #031a03 0%, #000 100%);
  font-family: 'Orbitron', sans-serif;
  color: var(--verde);
  overflow-x:hidden;
}

/* GRID FONDO */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: 
    linear-gradient(rgba(0,255,100,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,100,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:0;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
  z-index:1;
}

.logo {
  width:180px;
  filter: drop-shadow(0 0 20px var(--verde));
  margin-bottom:20px;
}

/* BOTONES */
.menu {
  display:flex;
  flex-direction:column;
  gap:20px;
}

.btn {
  padding:15px 40px;
  border:1px solid var(--verde);
  background: transparent;
  color: var(--verde);
  text-align:left;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

.btn:hover {
  background: rgba(0,255,100,0.1);
  box-shadow: 0 0 15px var(--verde);
  transform: scale(1.05);
}

/* EFECTO SELECCION */
.btn::before {
  content:"";
  position:absolute;
  left:-10px;
  top:50%;
  width:8px;
  height:8px;
  background:var(--verde);
  border-radius:50%;
  transform:translateY(-50%);
  opacity:0;
}

.btn:hover::before {
  opacity:1;
}

/* PROMOS */
.promos {
  padding:80px 20px;
  text-align:center;
}

.promos h2 {
  margin-bottom:30px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.promo-card {
  border:1px solid rgba(0,255,100,0.2);
  padding:10px;
  position:relative;
  overflow:hidden;
}

.promo-card img {
  width:100%;
  height:250px;
  object-fit:cover;
  opacity:0.8;
}

.promo-card:hover img {
  opacity:1;
}

.promo-card::after {
  content:"";
  position:absolute;
  inset:0;
  border:1px solid var(--verde);
  opacity:0;
  transition:0.3s;
}

.promo-card:hover::after {
  opacity:1;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  z-index:10;
}

.modal.show {
  display:flex;
}

.modal-content {
  border:1px solid var(--verde);
  padding:30px;
  width:90%;
  max-width:320px;
  text-align:center;
  background: rgba(0,20,0,0.8);
}

.modal a {
  display:block;
  margin:12px 0;
  color:var(--verde);
  text-decoration:none;
}

.modal button {
  margin-top:15px;
  padding:10px 20px;
  background:transparent;
  border:1px solid var(--verde);
  color:var(--verde);
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <img src="kongg.png" class="logo">

  <div class="menu">
    <button class="btn" onclick="openModal('zacatelco')">ZACATELCO</button>
    <button class="btn" onclick="openModal('puebla')">PUEBLA</button>
    <button class="btn" onclick="openModal('cholula')">CHOLULA</button>
  </div>
</section>

<!-- PROMOS -->
<section class="promos">
  <h2>SYSTEM PROMOS</h2>

  <div class="cards">
    <div class="promo-card">
      <img src="img/promo2.webp">
    </div>

    <div class="promo-card">
      <img src="img/promo1.webp">
    </div>
  </div>
</section>

<!-- MODALS -->
<div id="zacatelco" class="modal">
  <div class="modal-content">
    <h2>ZACATELCO</h2>
    <a href="https://wa.me/522463335286" target="_blank">WHATSAPP</a>
    <a href="https://maps.app.goo.gl/Krjpk4uEXftTmZTT9" target="_blank">MAPS</a>
    <a href="https://www.instagram.com/kong_styletlax" target="_blank">INSTAGRAM</a>
    <button onclick="closeModal()">CLOSE</button>
  </div>
</div>

<div id="puebla" class="modal">
  <div class="modal-content">
    <h2>PUEBLA</h2>
    <a href="https://wa.me/522221171466" target="_blank">WHATSAPP</a>
    <a href="https://maps.app.goo.gl/1qL6vZrHGEgwBD6j7" target="_blank">MAPS</a>
    <a href="https://www.instagram.com/kong_stylemx" target="_blank">INSTAGRAM</a>
    <button onclick="closeModal()">CLOSE</button>
  </div>
</div>

<div id="cholula" class="modal">
  <div class="modal-content">
    <h2>CHOLULA</h2>
    <a href="https://maps.app.goo.gl/5wtao2j7wzBmtDLv9" target="_blank">MAPS</a>
    <a href="https://www.instagram.com/kong_stylemx" target="_blank">INSTAGRAM</a>
    <button onclick="closeModal()">CLOSE</button>
  </div>
</div>

<script>
function openModal(id){
  document.getElementById(id).classList.add('show');
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
}
</script>

</body>
</html>
