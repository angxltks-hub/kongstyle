<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONG STYLE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --verde: #00ff88;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background: radial-gradient(circle, #031a03 0%, #000 100%);
  font-family: 'Orbitron', sans-serif;
  color: var(--verde);
}

/* GRID FONDO */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(0,255,100,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,100,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:0;
}

/* PROMOS */
.promos {
  padding:60px 20px;
  text-align:center;
  position:relative;
  z-index:1;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.promo-card {
  border-radius:15px;
  overflow:hidden;
  backdrop-filter: blur(10px);
  border:1px solid rgba(0,255,136,0.2);
  transition:0.4s;
}

.promo-card img {
  width:100%;
  height:260px;
  object-fit:cover;
  opacity:0.9;
}

.promo-card:hover {
  transform:scale(1.03);
  box-shadow:0 0 20px var(--verde);
}

/* LIQUID GLASS */
.btn {
  width:280px;
  padding:15px;
  text-align:center;
  color:var(--verde);
  text-decoration:none;
  border-radius:20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border:1px solid rgba(0,255,136,0.3);

  position:relative;
  overflow:hidden;
  transition:0.4s;
}

/* brillo líquido */
.btn::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(0,255,136,0.4) 0%, transparent 60%);
  top:-50%;
  left:-50%;
  opacity:0;
  transition:0.5s;
}

.btn:hover::before {
  opacity:1;
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,255,136,0.6);
}
</style>
</head>

<body>

<!-- PROMOS PRIMERO -->
<section class="promos">
  <h2>🔥 PROMOS</h2>

  <div class="cards">
    <div class="promo-card">
      <img src="img/promo1.webp">
    </div>

    <div class="promo-card">
      <img src="img/promo2.webp">
    </div>
  </div>
</section>

<!-- MODALS -->
<div id="zacatelco" class="modal">
  <div class="modal-content">
    <h2>ZACATELCO</h2>
    <a href="https://wa.me/522463335286" target="_blank">WHATSAPP</a>
    <a href="https://maps.app.goo.gl/Krjpk4uEXftTmZTT9" target="_blank">MAPS</a>
    <a href="https://www.instagram.com/kong_styletlax" target="_blank">INSTAGRAM</a>
    <button onclick="closeModal()">CLOSE</button>
  </div>
</div>

<div id="puebla" class="modal">
  <div class="modal-content">
    <h2>PUEBLA</h2>
    <a href="https://wa.me/522221171466" target="_blank">WHATSAPP</a>
    <a href="https://maps.app.goo.gl/1qL6vZrHGEgwBD6j7" target="_blank">MAPS</a>
    <a href="https://www.instagram.com/kong_stylemx" target="_blank">INSTAGRAM</a>
    <button onclick="closeModal()">CLOSE</button>
  </div>
</div>

<div id="cholula" class="modal">
  <div class="modal-content">
    <h2>CHOLULA</h2>
    <a href="https://maps.app.goo.gl/5wtao2j7wzBmtDLv9" target="_blank">MAPS</a>
    <a href="https://www.instagram.com/kong_stylemx" target="_blank">INSTAGRAM</a>
    <button onclick="closeModal()">CLOSE</button>
  </div>
</div>

<script>
function openModal(id){
  document.getElementById(id).classList.add('show');
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
}
</script>

</body>
</html>
